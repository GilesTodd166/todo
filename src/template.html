        <div class="delete-modal">

                <div class="modal-content">

                    <div class="modal-header">
                        <h1 class="modal-header-h1">Delete Task</h1>
                    <img id="closeIcon" class="settings-icon" src="media/icons/close_grey.svg" height="16px">
                </div>

                <div class="modal-line"></div>

                    <div class="modal-text">
                        <p>Are you sure you want to delete this Task:</p>
                    </div>

                    <div id="modalTitle" class="modal-element">
                        <h3>Task Name</h3>
                    </div>

                    <div class="modal-element">
                        <button class="save-btn" type="submit">Save</button>
                        <button class="delete-btn" role="button">Delete</button>
                    </div>

                    <!-- STOP -- complete design of delete modal, and then work on dynamically loading task data! -->

                </div>
        </div>

        <div class="delete-tag-modal">

                <div class="modal-content">

                    <div class="modal-header">
                    <h1>Delete Tag</h1>
                    <img id="closeIcon" class="settings-icon" src="media/icons/close_grey.svg" height="16px">
                </div>

                <div class="modal-line"></div>

                    <div class="modal-element">
                        <p>Are you sure you want to delete this tag:</p>
                    </div>

                    <div id="modalTitle" class="modal-element">
                        <h3>Tag Name</h3>
                    </div>

                    <div class="modal-element">
                        <button class="save-btn" type="submit">Save</button>
                        <button class="delete-btn" role="button">Delete</button>
                    </div>

                </div>
        </div>

        <div class="task-modal">

            <div class="modal-content">

                <div class="modal-header">
                    <h1>Add / Update Task</h1>
                    <img id="closeIcon" class="settings-icon" src="media/icons/close_grey.svg" height="16px">
                </div>
                
                    <div class="modal-line"></div>

                <!-- Could dropdown options for child projects w/ JS -->
                <!-- <div class="modal-element">
                    <label class="label-text" for="task-section" autofocus>Child Project:</label>
                        <select name="task-section" id="task-section">
                            <option value="Child Project">Child Project</option>
                            <option value="New Child Project">New Child Project</option>
                        </select>
                </div> -->

            
                <form id="task-form" onsubmit="return false;">

                <div class="modal-element">
                    <label class="label-text" for="task-name" autofocus>Task Name:</label>
                        <input id="task-name" name="task-name" type="text" required>
                </div>

                <div class="modal-element">
                    <label class="label-text" for="task-desc">Task Description:</label>
                        <input id="task-desc" name="task-desc" type="text" required>
                </div>

                <div class="modal-element">
                    <label class="label-text" for="task-date">Due Date:</label>
                        <input id="task-date" name="task-date" type="date" required> <!--use calendar plugin-->
                </div>

                <div class="modal-element">
                    <label for="task-priority" class="label-text">Priority</label>
                        <select name="task-priority" id="task-priority">
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low" selected>Low</option>
                        </select>
                </div>

                <div class="modal-element">
                    <label class="label-text" for="task-tags">Tags:</label>
                        <!-- <input id="task-tags" name="task-tags" type="text"> -->
                         <select id="task-tags" name="task-tags">
                                <option disabled selected value> -- select an option -- </option>
                         </select>
                </div>

                <div class="modal-element">
                    <div id="modal-tags">
                        <label class="label-text" for="task-tags">Saved Tags:</label>
                    </div>
                </div>

                <div class="modal-element">
                    <label class="label-text" for="task-comments">Comments:</label>
                        <textarea id="task-comments" name="task-comments" type="text" maxlength="300"></textarea>
                </div>

                <div class="modal-element">
                    <div id="modal-comments">
                        <label class="label-text" for="task-comments">Saved Comments:</label>
                            <!-- <div class="saved-comment">
                                <p>This is a comment left by a previous person adding or updating the task.</p>
                                <div class="modal-line"></div>
                            </div>
                            <div class="saved-comment">
                                <p>This is a comment left by a previous person adding or updating the task. It is a longer test than the first one.</p>
                                <div class="modal-line"></div>
                            </div>
                         -->
                    </div>
                </div>

                <div class="modal-element">
                    <button class="modal-save-btn" type="submit">Save</button>
                    <button class="delete-btn task-delete" type="button">Delete</button>
                </div>

                </form>

            </div>
        </div>

        <div class="project-modal">

            <div class="modal-content">

                <div class="modal-header">
                    <h1>Add Project</h1>
                    <img id="closeIcon" class="settings-icon" src="media/icons/close_grey.svg" height="16px">
                </div>
                
                    <div class="modal-line"></div>

                <form id="project-form" onsubmit="return false;">

                <div class="modal-element">
                    <label class="label-text" for="task-name" autofocus>Project Name:</label>
                        <input id="project-name" name="project-name" type="text" required>
                </div>

                    <!-- <div class="modal-line"></div> -->

                <div class="modal-element">
                    <button class="project-save-btn" type="submit">Save</button>
                    <button class="delete-btn" type="button">Delete</button>
                </div>

                </form>

            </div>
        </div>

        <div class="tag-modal">

            <div class="modal-content">

                <div class="modal-header">
                    <h1>Add Tag</h1>
                    <img id="closeIcon" class="settings-icon" src="media/icons/close_grey.svg" height="16px">
                </div>
                
                    <div class="modal-line"></div>

                <form id="tag-form" onsubmit="return false;">

                <div class="modal-element">
                    <label class="label-text" for="tag-name" autofocus>Tag Name:</label>
                        <input id="tag-name" name="tag-name" type="text" required>
                </div>

                    <!-- <div class="modal-line"></div> -->

                <div class="modal-element">
                    <button class="tag-save-btn" type="submit">Save</button>
                    <button class="delete-btn" type="button">Delete</button>
                </div>

                </form>

            </div>
        </div>
